<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔥 Vidyora - P2P Video Chat with Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: #0b1120;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Auth Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .auth-container {
            background: rgba(17, 25, 40, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            width: 360px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 50px -12px #000;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 1rem;
        }

        .auth-tab {
            color: #94a3b8;
            font-weight: 600;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 2rem;
        }

        .auth-tab.active {
            background: #1e3a5f;
            color: white;
        }

        .login-input {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 3rem;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        .login-input:focus {
            border-color: #38bdf8;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: #1e3a5f;
            border: none;
            border-radius: 3rem;
            color: white;
            font-weight: 600;
            margin: 1rem 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #2b4f7b;
        }

        /* Main App */
        .container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: #0f172a;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1.2rem 2rem;
            background: #1a2639;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d3a4e;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: white;
        }

        .logo-icon {
            font-size: 2rem;
            color: #38bdf8;
        }

        .theme-toggle {
            background: #2d3a4e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .connection-status {
            background: #1e293b;
            padding: 0.5rem 2rem;
            color: #94a3b8;
            font-size: 0.9rem;
            display: flex;
            gap: 2rem;
        }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #111c2e;
            border-right: 1px solid #1e293b;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #1e293b;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: #1e3a5f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .user-info {
            color: white;
        }

        .username {
            font-weight: 600;
        }

        .user-status {
            font-size: 0.8rem;
            color: #22c55e;
        }

        .your-peer-id {
            background: #1a2639;
            padding: 1rem;
            border-radius: 1.5rem;
        }

        .peer-id-display {
            background: #0f172a;
            padding: 0.8rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
            font-family: monospace;
            color: #38bdf8;
            word-break: break-all;
        }

        .copy-btn {
            width: 100%;
            padding: 0.6rem;
            background: #2d3a4e;
            border: none;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }

        .connect-form {
            background: #1a2639;
            padding: 1rem;
            border-radius: 1.5rem;
        }

        .connect-form input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: #0f172a;
            border: 1px solid #2d3a4e;
            border-radius: 2rem;
            color: white;
        }

        .connect-btn {
            width: 100%;
            padding: 0.8rem;
            background: #1e3a5f;
            border: none;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-list h3 {
            color: white;
            margin-bottom: 1rem;
        }

        .users {
            list-style: none;
        }

        .users li {
            padding: 0.8rem;
            background: #1a2639;
            margin: 0.3rem 0;
            border-radius: 2rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .video-container {
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            background: #0b1120;
            border-bottom: 1px solid #1e293b;
        }

        .video-box {
            flex: 1;
            aspect-ratio: 16/9;
            background: #1a2639;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            border: 2px solid #2d3a4e;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 16px;
            border-radius: 2rem;
            font-size: 0.8rem;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 1.5rem;
            background: #1e293b;
            color: white;
            align-self: flex-start;
        }

        .message.outgoing {
            background: #1e3a5f;
            align-self: flex-end;
        }

        .message small {
            display: block;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .message img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 1rem;
            margin-top: 5px;
            cursor: pointer;
        }

        .media-controls {
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.8rem;
            background: #111c2e;
            border-top: 1px solid #1e293b;
        }

        .media-controls button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #1e293b;
            color: white;
            cursor: pointer;
        }

        .media-controls select {
            padding: 0 1rem;
            border-radius: 2rem;
            background: #1e293b;
            color: white;
            border: none;
        }

        .controls {
            padding: 1rem 1.5rem;
            display: flex;
            gap: 1rem;
            background: #111c2e;
            border-top: 1px solid #1e293b;
        }

        .message-controls {
            flex: 1;
            display: flex;
            gap: 0.5rem;
        }

        .message-controls input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            background: #1e293b;
            border: 1px solid #2d3a4e;
            border-radius: 2rem;
            color: white;
        }

        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #1e3a5f;
            border: none;
            color: white;
            cursor: pointer;
        }

        .video-controls {
            display: flex;
            gap: 0.5rem;
        }

        .video-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            border: none;
            background: #1e3a5f;
            color: white;
            cursor: pointer;
        }

        /* Call Request Modal */
        .call-request {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 2rem;
            border-radius: 2rem;
            border: 1px solid #38bdf8;
            z-index: 1500;
            display: none;
            text-align: center;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div class="login-screen" id="auth-screen">
        <div class="auth-container floating">
            <div class="auth-tabs">
                <div class="auth-tab active" id="login-tab">Login</div>
                <div class="auth-tab" id="register-tab">Register</div>
            </div>
            
            <div id="login-form">
                <input type="email" id="login-email" class="login-input" placeholder="Email">
                <input type="password" id="login-password" class="login-input" placeholder="Password">
                <button class="login-btn" id="login-user-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
            
            <div id="register-form" style="display: none;">
                <input type="text" id="register-name" class="login-input" placeholder="Display Name">
                <input type="email" id="register-email" class="login-input" placeholder="Email">
                <input type="password" id="register-password" class="login-input" placeholder="Password">
                <button class="login-btn" id="register-user-btn">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>
        </div>
    </div>

    <!-- Call Request Modal -->
    <div class="call-request" id="call-request">
        <h3 id="caller-name">User wants to video chat</h3>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button class="video-btn" id="accept-call" style="background: #059669;">
                <i class="fas fa-check"></i> Accept
            </button>
            <button class="video-btn" id="reject-call" style="background: #d63031;">
                <i class="fas fa-times"></i> Reject
            </button>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="container" id="app-container" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-comments logo-icon"></i>
                <h1>Vidyora</h1>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="theme-toggle">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </div>

        <!-- Connection Status -->
        <div class="connection-status">
            <span id="connection-quality">🔴 Connecting...</span>
            <span id="ping-display">Ping: --</span>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-info">
                        <div class="username" id="display-username">User</div>
                        <div class="user-status">Online</div>
                    </div>
                </div>

                <div class="your-peer-id">
                    <h3><i class="fas fa-id-card"></i> Your ID</h3>
                    <div class="peer-id-display" id="peer-id-display">Connecting...</div>
                    <button class="copy-btn" id="copy-id-btn">
                        <i class="far fa-copy"></i> Copy
                    </button>
                </div>

                <div class="connect-form">
                    <h3><i class="fas fa-link"></i> Connect to Peer</h3>
                    <input type="text" id="peer-id-input" placeholder="Enter Peer ID">
                    <button class="connect-btn" id="connect-btn">
                        <i class="fas fa-plug"></i> Connect
                    </button>
                </div>

                <div class="user-list">
                    <h3><i class="fas fa-users"></i> Active Users</h3>
                    <ul class="users" id="users"></ul>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <!-- Video Container -->
                <div class="video-container" id="video-container">
                    <div class="video-box">
                        <video id="local-video" autoplay muted playsinline></video>
                        <span class="video-label">You</span>
                    </div>
                    <div class="video-box">
                        <video id="remote-video" autoplay playsinline></video>
                        <span class="video-label">Peer</span>
                    </div>
                </div>

                <!-- Chat Box -->
                <div class="chat-box" id="chat-box"></div>

                <!-- Media Controls -->
                <div class="media-controls">
                    <button id="screen-share-btn" title="Share Screen">
                        <i class="fas fa-desktop"></i>
                    </button>
                    <button id="mute-mic-btn" title="Mute Mic">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button id="disable-cam-btn" title="Disable Camera">
                        <i class="fas fa-video"></i>
                    </button>
                    <select id="video-quality">
                        <option value="hd">HD</option>
                        <option value="sd" selected>SD</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <!-- Message Controls -->
                <div class="controls">
                    <div class="message-controls">
                        <input type="text" id="message-input" placeholder="Type your message...">
                        <label for="image-upload" class="action-btn" style="display: inline-flex; align-items: center; justify-content: center;">
                            <i class="fas fa-image"></i>
                        </label>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                        <button class="action-btn" id="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="video-controls">
                        <button class="video-btn" id="start-video">
                            <i class="fas fa-video"></i> Start Video
                        </button>
                        <button class="video-btn" id="end-video" disabled>
                            <i class="fas fa-video-slash"></i> End Video
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <!-- PeerJS Library -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <script>
        // Firebase Configuration (Free Tier)
        const firebaseConfig = {
  apiKey: "AIzaSyDRw4QHPAWXty31nryeRFmeMztb_9j8-TQ",
  authDomain: "adminsblog-9cd55.firebaseapp.com",
  databaseURL: "https://adminsblog-9cd55-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "adminsblog-9cd55",
  storageBucket: "adminsblog-9cd55.firebasestorage.app",
  messagingSenderId: "622544158173",
  appId: "1:622544158173:web:bef504dd215193fd4c4a34"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

// DOM Elements
        const authScreen = document.getElementById('auth-screen');
        const appContainer = document.getElementById('app-container');
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const loginBtn = document.getElementById('login-user-btn');
        const registerBtn = document.getElementById('register-user-btn');
        const displayUsername = document.getElementById('display-username');
        const userAvatar = document.getElementById('user-avatar');
        const peerIdDisplay = document.getElementById('peer-id-display');
        const copyIdBtn = document.getElementById('copy-id-btn');
        const connectBtn = document.getElementById('connect-btn');
        const peerIdInput = document.getElementById('peer-id-input');
        const usersList = document.getElementById('users');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const imageUpload = document.getElementById('image-upload');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const startVideoBtn = document.getElementById('start-video');
        const endVideoBtn = document.getElementById('end-video');
        const muteMicBtn = document.getElementById('mute-mic-btn');
        const disableCamBtn = document.getElementById('disable-cam-btn');
        const screenShareBtn = document.getElementById('screen-share-btn');
        const acceptCall = document.getElementById('accept-call');
        const rejectCall = document.getElementById('reject-call');
        const callRequest = document.getElementById('call-request');
        const callerName = document.getElementById('caller-name');

        // State
        let currentUser = null;
        let peer = null;
        let currentPeerId = null;
        let localStream = null;
        let currentCall = null;
        let activeConnections = new Map();
        let isMicMuted = false;
        let isCamDisabled = false;

        // Auth Tabs
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
        });

        // Register
        registerBtn.addEventListener('click', async () => {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: name });
                await db.collection('users').doc(cred.user.uid).set({
                    name: name,
                    email: email,
                    online: true,
                    peerId: null
                });
            } catch (error) {
                alert(error.message);
            }
        });

        // Login
        loginBtn.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                alert(error.message);
            }
        });

        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                authScreen.style.display = 'none';
                appContainer.style.display = 'flex';
                displayUsername.textContent = user.displayName || 'User';
                userAvatar.textContent = (user.displayName || 'U')[0].toUpperCase();

                // Initialize PeerJS
                peer = new Peer(generatePeerId(user.uid), {
                    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
                });

                peer.on('open', async (id) => {
                    peerIdDisplay.textContent = id;
                    currentPeerId = id;
                    
                    // Update user in Firestore
                    await db.collection('users').doc(user.uid).update({
                        peerId: id,
                        online: true
                    });

                    // Load active users
                    loadActiveUsers();
                    
                    // Load chat history
                    loadChatHistory();
                });

                peer.on('call', (call) => {
                    if (confirm('Incoming call. Accept?')) {
                        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                            .then(stream => {
                                localStream = stream;
                                localVideo.srcObject = stream;
                                call.answer(stream);
                                
                                call.on('stream', (remoteStream) => {
                                    remoteVideo.srcObject = remoteStream;
                                });
                                
                                currentCall = call;
                                startVideoBtn.disabled = true;
                                endVideoBtn.disabled = false;
                            });
                    } else {
                        call.close();
                    }
                });

                peer.on('connection', (conn) => {
                    activeConnections.set(conn.peer, conn);
                    
                    conn.on('data', (data) => {
                        if (data.type === 'message') {
                            displayMessage(data.text, data.sender, false);
                            saveMessageToFirestore(data.text, data.sender, false);
                        }
                    });
                });

                // Update online status on disconnect
                window.addEventListener('beforeunload', () => {
                    db.collection('users').doc(user.uid).update({ online: false });
                });
            } else {
                authScreen.style.display = 'flex';
                appContainer.style.display = 'none';
            }
        });

        // Helper Functions
        function generatePeerId(uid) {
            return uid.substring(0, 8) + '-' + Math.random().toString(36).substr(2, 4);
        }

        async function loadActiveUsers() {
            db.collection('users').onSnapshot((snapshot) => {
                usersList.innerHTML = '';
                snapshot.forEach((doc) => {
                    if (doc.id !== currentUser.uid) {
                        const user = doc.data();
                        const li = document.createElement('li');
                        li.innerHTML = `<i class="fas fa-user-circle"></i> ${user.name} ${user.online ? '<span style="color:#22c55e">●</span>' : ''}`;
                        li.addEventListener('click', () => {
                            peerIdInput.value = user.peerId || '';
                        });
                        usersList.appendChild(li);
                    }
                });
            });
        }

        async function loadChatHistory() {
            const messages = await db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .orderBy('timestamp')
                .limit(50)
                .get();

            chatBox.innerHTML = '';
            messages.forEach((doc) => {
                const msg = doc.data();
                displayMessage(msg.text, msg.senderName, msg.senderId === currentUser.uid);
            });
        }

        function displayMessage(text, sender, isOutgoing) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : ''}`;
            msgDiv.innerHTML = `
                ${text}
                <small>${sender} · ${new Date().toLocaleTimeString()}</small>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function saveMessageToFirestore(text, senderName, isOutgoing) {
            await db.collection('chats').add({
                text: text,
                senderId: currentUser.uid,
                senderName: senderName,
                participants: [currentUser.uid, currentCall?.peer || ''],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // Send Message
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (!text || !currentCall) {
                alert('Connect to a peer first');
                return;
            }

            const conn = activeConnections.get(currentCall.peer);
            if (conn) {
                conn.send({ type: 'message', text: text, sender: currentUser.displayName });
                displayMessage(text, 'You', true);
                await saveMessageToFirestore(text, currentUser.displayName, true);
                messageInput.value = '';
            }
        });

        // Image Upload with Compression
        imageUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file && currentCall) {
                // Compress image
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Compress to max 800px width
                        let width = img.width;
                        let height = img.height;
                        if (width > 800) {
                            height *= 800 / width;
                            width = 800;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        
                        // Store in Firestore
                        await db.collection('images').add({
                            data: compressedDataUrl,
                            senderId: currentUser.uid,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        
                        // Send via peer connection
                        const conn = activeConnections.get(currentCall.peer);
                        if (conn) {
                            conn.send({ type: 'image', data: compressedDataUrl, sender: currentUser.displayName });
                        }
                        
                        // Display
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message outgoing';
                        msgDiv.innerHTML = `
                            <img src="${compressedDataUrl}" style="max-width:200px">
                            <small>You · now</small>
                        `;
                        chatBox.appendChild(msgDiv);
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // Start Video Call
        startVideoBtn.addEventListener('click', async () => {
            const targetPeerId = peerIdInput.value;
            if (!targetPeerId) {
                alert('Enter peer ID to call');
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;

                const call = peer.call(targetPeerId, localStream);
                
                call.on('stream', (remoteStream) => {
                    remoteVideo.srcObject = remoteStream;
                });

                call.on('close', () => {
                    endCall();
                });

                currentCall = call;
                startVideoBtn.disabled = true;
                endVideoBtn.disabled = false;

                // Create data connection
                const conn = peer.connect(targetPeerId);
                activeConnections.set(targetPeerId, conn);
            } catch (err) {
                alert('Could not start video: ' + err.message);
            }
        });

        // End Video Call
        endVideoBtn.addEventListener('click', endCall);

        function endCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            startVideoBtn.disabled = false;
            endVideoBtn.disabled = true;
        }

        // Mute Mic
        muteMicBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getAudioTracks().forEach(track => {
                    track.enabled = isMicMuted;
                });
                isMicMuted = !isMicMuted;
                muteMicBtn.innerHTML = `<i class="fas fa-microphone${isMicMuted ? '-slash' : ''}"></i>`;
            }
        });

        // Disable Camera
        disableCamBtn.addEventListener('click', () => {
            if (localStream) {
                localStream.getVideoTracks().forEach(track => {
                    track.enabled = isCamDisabled;
                });
                isCamDisabled = !isCamDisabled;
                disableCamBtn.innerHTML = `<i class="fas fa-video${isCamDisabled ? '-slash' : ''}"></i>`;
            }
        });

        // Screen Share
        screenShareBtn.addEventListener('click', async () => {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                }
                
                videoTrack.onended = () => {
                    if (localStream) {
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) {
                            sender.replaceTrack(localStream.getVideoTracks()[0]);
                        }
                    }
                };
            } catch (err) {
                alert('Screen share failed');
            }
        });

        // Copy Peer ID
        copyIdBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(peerIdDisplay.textContent);
            alert('Peer ID copied!');
        });

        // Connect to peer manually
        connectBtn.addEventListener('click', () => {
            const targetId = peerIdInput.value;
            if (targetId) {
                const conn = peer.connect(targetId);
                activeConnections.set(targetId, conn);
                alert('Connection established');
            }
        });
    </script>
</body>
</html>
